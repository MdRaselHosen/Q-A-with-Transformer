<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q&A with Transformer</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow p-4">
            <h2 class="text-center mb-4">AI Question Answers</h2>

            <form method="POST">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Context Paragraph</label>
                    <textarea name="context" class="form-control" rows="6" required></textarea>
                </div>
                <div class="mb-3">
                    <label class="form-label">Question</label>
                    <input type="text", name="question" class="form-control" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">
                    Search
                </button>
            </form>
            {% if answer %}
                <div class="alert alert-success mt-4">
                    <strong>Answer is : </strong>{{answer}}
                </div>
            {% endif %}
        </div>
    </div>
</body>
</html>
